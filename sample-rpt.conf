; rpt.conf - AllStarLink 3 Sample Configuration
; This sample file is provided for testing the rpt.conf editor.
; Replace node number 1999 with your actual assigned node number.

[general]
node_lookup_method = both   ; method used to lookup nodes
                            ; both = dns lookup first, followed by external file (default)
                            ; dns  = dns lookup only
                            ; file = external file lookup only
;dns_node_domain = nodes.allstarlink.org
;max_dns_node_length = 6

[1999]                          ; Replace with your node number
rxchannel = SimpleUSB/usb_1999  ; Channel driver for radio interface
duplex = 2                      ; 2 = Full duplex with telemetry
callerid = "WB6NIL" <1999>      ; Caller ID for linking

; Station ID
idrecording = rpt/nodenames/1999  ; Voice ID sound file
idtime = 300000                   ; ID every 5 minutes (ms)
politeid = 30000                  ; Try tail ID 30 sec before expiry

; Timers
hangtime = 5000        ; Repeater hang time (ms)
althangtime = 4000     ; Alternate hang time (ms)
totime = 180000        ; Transmit timeout (ms)

; Telemetry
telemetry = telemetry
telemdefault = 1
telemdynamic = yes
holdofftelem = 0
telemduckdb = -15
unlinkedct = ct2
remotect = ct3
linkunkeyct = ct8
;nolocallinkct = 0
;nounkeyct = no

; DTMF
funcchar = *
endchar = #
functions = functions
link_functions = link-functions
phone_functions = phone-functions

; Nodes
nodes = nodes
extnodefile = /var/lib/asterisk/rpt_extnodes
nodenames = /var/lib/asterisk/sounds/rpt/nodenames
morse = morse
context = radio

; Misc
accountcode = RADIO
linktolink = no
parrot = no

[functions]
1  = ilink,1   ; Disconnect specified link
2  = ilink,2   ; Connect specified link - monitor only
3  = ilink,3   ; Connect specified link - transceive
4  = ilink,4   ; Enter command mode on specified link
5  = ilink,5   ; Status
6  = ilink,6   ; Disconnect all links
7  = ilink,7   ; Last node to key up
8  = ilink,8   ; Connect - local monitor only
12 = ilink,12  ; Permanently connect - monitor only
13 = ilink,13  ; Permanently connect - transceive
700 = status,1   ; Force ID (global)
702 = status,2   ; Give time of day (global)
703 = status,3   ; Software version
711 = status,11  ; Force ID (local)
712 = status,12  ; Give time of day (local)
901 = cop,1   ; System warm boot
902 = cop,2   ; System enable
903 = cop,3   ; System disable
904 = cop,4   ; Test tone on/off
911 = cop,11  ; Link enable
912 = cop,12  ; Link disable
921 = cop,21  ; Enable parrot mode
922 = cop,22  ; Disable parrot mode

[link-functions]
1 = ilink,1
2 = ilink,2
3 = ilink,3
5 = ilink,5
6 = ilink,6

[phone-functions]
1 = ilink,1
2 = ilink,2
3 = ilink,3
5 = ilink,5
6 = ilink,6
906 = cop,6   ; PTT (phone mode only)

[telemetry]
ct1 = |t(350,0,100,3072)(500,0,100,3072)(660,0,100,3072)
ct2 = |t(660,880,150,3072)
ct3 = |t(440,0,150,3072)
ct4 = |t(550,0,150,3072)
ct5 = |t(660,0,150,3072)
ct6 = |t(880,0,150,3072)
ct7 = |t(660,440,150,3072)
ct8 = |t(700,1100,150,3072)
remotemon = |t(1209,0,75,3072)
remotetx  = |t(1209,0,75,3072)(0,0,75,0)(1209,0,75,3072)
cmdmode   = |t(900,904,200,3072)
functcomplete = |t(1000,0,100,3072)(0,0,100,0)(1000,0,100,3072)
remdisc    = |t(1400,0,200,3072)
remalready = |t(1400,0,200,3072)(0,0,200,0)(1400,0,200,3072)
remtx      = |t(700,1100,150,3072)(0,0,150,0)(700,1100,150,3072)

[nodes]
; Static node connections go here
; Example: 2000 = radio@allstar2.somewhere.com/2000,NONE

[morse]
speed       = 20
frequency   = 800
amplitude   = 4096
idfrequency = 800
idamplitude = 4096
idspeed     = 20
