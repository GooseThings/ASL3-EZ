<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL3-EZ | {% if setup_mode %}Create Account{% else %}Sign In{% endif %}</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0e1117;
  --bg2:    #161b22;
  --bg3:    #1f2937;
  --border: #30363d;
  --accent: #58a6ff;
  --green:  #3fb950;
  --danger: #f85149;
  --text:   #e6edf3;
  --text2:  #8b949e;
  --text3:  #c9d1d9;
  --radius: 6px;
}

html { font-size: 15px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 360px;
  padding: 32px 28px;
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2px;
}

.app-sub {
  font-size: 0.8rem;
  color: var(--text2);
  margin-bottom: 24px;
}

h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.hint {
  font-size: 0.82rem;
  color: var(--text2);
  margin-bottom: 18px;
  line-height: 1.5;
}

.error {
  background: rgba(248,81,73,0.08);
  border: 1px solid rgba(248,81,73,0.3);
  color: var(--danger);
  border-radius: var(--radius);
  padding: 9px 13px;
  font-size: 0.88rem;
  margin-bottom: 16px;
}

.fg {
  margin-bottom: 14px;
}

label {
  display: block;
  font-size: 0.83rem;
  font-weight: 500;
  color: var(--text3);
  margin-bottom: 4px;
}

input[type=text], input[type=password] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 7px 10px;
  font-size: 0.92rem;
  font-family: inherit;
  transition: border-color 0.12s;
  min-height: 36px;
}

input:focus {
  outline: none;
  border-color: var(--accent);
}

button[type=submit] {
  width: 100%;
  margin-top: 6px;
  padding: 9px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius);
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.12s;
  min-height: 38px;
}

button[type=submit]:hover {
  background: #4898ef;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">ASL3-EZ</div>
  <div class="app-sub">AllStarLink 3 Manager</div>

  <h2>{% if setup_mode %}Create Account{% else %}Sign In{% endif %}</h2>

  {% if setup_mode %}
  <p class="hint">No account exists yet. Create one to secure access to this node manager.</p>
  {% endif %}

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="fg">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             required autofocus>
    </div>
    <div class="fg">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="{% if setup_mode %}new-password{% else %}current-password{% endif %}"
             required>
    </div>
    {% if setup_mode %}
    <div class="fg">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             autocomplete="new-password" required>
    </div>
    {% endif %}
    <button type="submit">{% if setup_mode %}Create Account{% else %}Sign In{% endif %}</button>
  </form>
</div>
</body>
</html>
