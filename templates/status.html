<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASL3-EZ Status Board</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #070a0f;
  --bg2:      #0d1117;
  --bg3:      #161b24;
  --border:   #21283a;
  --accent:   #58a6ff;
  --green:    #3fb950;
  --warn:     #d29922;
  --danger:   #f85149;
  --text:     #e6edf3;
  --text2:    #8b949e;
  --mono:     'Courier New', Courier, monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  overflow: hidden;
}

/* ── Layout ── */
.board {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 18px 22px 14px;
  gap: 14px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  flex-shrink: 0;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
  color: var(--text2);
  letter-spacing: 0.05em;
}

.header-brand strong {
  color: var(--accent);
  font-size: 1.1rem;
  letter-spacing: 0.08em;
}

.header-clock {
  font-size: 2.8rem;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
  color: var(--text);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ast-status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  border: 1px solid var(--border);
}

.ast-status-pill.running { border-color: var(--green); color: var(--green); }
.ast-status-pill.stopped { border-color: var(--danger); color: var(--danger); }

.ast-status-pill .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.btn-icon {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 0.85rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: color 0.15s, border-color 0.15s;
}

.btn-icon:hover { color: var(--text); border-color: var(--text2); }

/* ── Main grid ── */
.main-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 14px;
  flex: 1;
  min-height: 0;
}

/* ── Left column ── */
.left-col {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Node status card ── */
.node-status-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.node-label {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  color: var(--text2);
  text-transform: uppercase;
}

.node-number {
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1;
}

.node-callsign {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.node-location {
  font-size: 0.8rem;
  color: var(--text2);
  text-align: center;
}

.keyed-indicator {
  margin: 8px 0 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.keyed-dot {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #2a2a2a;
  border: 3px solid #333;
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
}

.keyed-dot.keyed {
  background: var(--green);
  border-color: #5de073;
  box-shadow: 0 0 28px rgba(63, 185, 80, 0.6), 0 0 60px rgba(63, 185, 80, 0.25);
  animation: pulse-key 1.4s ease-in-out infinite;
}

@keyframes pulse-key {
  0%, 100% { box-shadow: 0 0 28px rgba(63, 185, 80, 0.6), 0 0 60px rgba(63, 185, 80, 0.25); }
  50%       { box-shadow: 0 0 40px rgba(63, 185, 80, 0.9), 0 0 80px rgba(63, 185, 80, 0.4); }
}

.keyed-text {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
}

.keyed-text.keyed { color: var(--green); }

.link-count {
  font-size: 0.85rem;
  color: var(--text2);
}

.link-count span {
  color: var(--text);
  font-weight: 600;
}

/* ── System vitals card ── */
.vitals-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}

.vitals-card .card-title {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.vital-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}

.vital-row:last-child { border-bottom: none; }
.vital-label { color: var(--text2); }
.vital-value { font-weight: 600; font-variant-numeric: tabular-nums; }
.vital-value.ok     { color: var(--green); }
.vital-value.warn   { color: var(--warn); }
.vital-value.normal { color: var(--text); }

/* ── Right column: connected nodes ── */
.connected-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.connected-card .card-header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-shrink: 0;
}

.connected-card .card-title {
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  color: var(--text2);
  text-transform: uppercase;
}

.connected-count {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
}

.connected-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 0;
}

.connected-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text2);
  font-size: 1rem;
  letter-spacing: 0.06em;
}

.node-row {
  display: grid;
  grid-template-columns: 14px 90px 130px 1fr;
  gap: 0 16px;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.node-row:last-child { border-bottom: none; }
.node-row:hover { background: var(--bg3); }

.node-row-keyed {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #333;
  border: 1px solid #444;
  flex-shrink: 0;
}

.node-row-keyed.keyed {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 6px rgba(63,185,80,0.7);
}

.node-row-num {
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--text);
}

.node-row-call {
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.node-row-loc {
  font-size: 0.85rem;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Footer ── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 4px 16px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--text2);
  flex-shrink: 0;
}

.footer-updated { font-variant-numeric: tabular-nums; }

.stale-warn {
  color: var(--warn);
  font-weight: 600;
}

/* ── Multiple nodes layout ── */
.multi-node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}

/* ── Scrollbar styling ── */
.connected-list::-webkit-scrollbar { width: 4px; }
.connected-list::-webkit-scrollbar-track { background: transparent; }
.connected-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="board" id="board">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <strong>ASL3-EZ</strong>
      <span>STATUS BOARD</span>
    </div>
    <div class="header-clock" id="clock">--:--:--</div>
    <div class="header-actions">
      <div class="ast-status-pill" id="ast-pill">
        <div class="dot"></div>
        <span id="ast-pill-text">Asterisk</span>
      </div>
      <button class="btn-icon" onclick="toggleFullscreen()" title="Fullscreen">&#x26F6; Fullscreen</button>
      <a class="btn-icon" href="/" title="Dashboard">&#8592; Dashboard</a>
    </div>
  </header>

  <!-- Main grid — filled by JS -->
  <div class="main-grid" id="main-grid">
    <div class="left-col" id="left-col">
      <div class="node-status-card" style="justify-content:center;color:var(--text2)">Loading&hellip;</div>
    </div>
    <div class="connected-card" id="connected-card">
      <div class="card-header">
        <span class="card-title">Connected Nodes</span>
      </div>
      <div class="connected-list connected-empty">Loading&hellip;</div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>ASL3 ver <strong id="f-asl">—</strong> &nbsp;|&nbsp; Asterisk <span id="f-ast-ver">—</span></span>
    <span class="footer-updated">Updated: <span id="f-updated">—</span> <span id="f-stale" class="stale-warn" style="display:none">— DATA STALE</span></span>
    <span>Uptime: <strong id="f-uptime">—</strong> &nbsp;|&nbsp; Disk: <strong id="f-disk">—</strong></span>
  </footer>

</div>

<script>
/* ── Clock ── */
function tickClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
setInterval(tickClock, 1000);
tickClock();

/* ── Escape helper ── */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Fullscreen ── */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function(){});
  } else {
    document.exitFullscreen().catch(function(){});
  }
}

/* ── Build left column (node status + vitals) ── */
function buildLeft(data) {
  var nodes = data.nodes || [];
  var html  = '';

  nodes.forEach(function(n) {
    var keyed = n.keyed;
    html += '<div class="node-status-card">'
      + '<div class="node-label">NODE</div>'
      + '<div class="node-number">' + esc(n.node) + '</div>';
    if (n.callsign) html += '<div class="node-callsign">' + esc(n.callsign) + '</div>';
    if (n.location) html += '<div class="node-location">' + esc(n.location) + '</div>';
    html += '<div class="keyed-indicator">'
      + '<div class="keyed-dot' + (keyed ? ' keyed' : '') + '"></div>'
      + '<div class="keyed-text' + (keyed ? ' keyed' : '') + '">' + (keyed ? 'KEYED' : 'IDLE') + '</div>'
      + '</div>'
      + '<div class="link-count">Linked nodes: <span>' + (n.connected ? n.connected.length : 0) + '</span></div>'
      + (n.stale ? '<div style="font-size:0.75rem;color:var(--warn);margin-top:4px">&#9888; Stale data</div>' : '')
      + '</div>';
  });

  // Vitals
  var temp    = data.cpu_temp != null ? data.cpu_temp + ' °C' : 'N/A';
  var tempCls = data.cpu_temp != null ? (data.cpu_temp > 75 ? 'warn' : 'ok') : 'normal';
  var disk    = data.disk ? data.disk.used + ' / ' + data.disk.total + ' (' + data.disk.pct + ')' : 'N/A';
  html += '<div class="vitals-card">'
    + '<div class="card-title">System</div>'
    + '<div class="vital-row"><span class="vital-label">Uptime</span><span class="vital-value normal">' + esc(data.uptime || '—') + '</span></div>'
    + '<div class="vital-row"><span class="vital-label">CPU Temp</span><span class="vital-value ' + tempCls + '">' + esc(temp) + '</span></div>'
    + '<div class="vital-row"><span class="vital-label">Disk</span><span class="vital-value normal">' + esc(disk) + '</span></div>'
    + '<div class="vital-row"><span class="vital-label">AMI</span><span class="vital-value ' + (data.ami_connected ? 'ok' : 'warn') + '">' + (data.ami_connected ? 'Connected' : 'Connecting…') + '</span></div>'
    + '</div>';

  document.getElementById('left-col').innerHTML = html;
}

/* ── Build right column (connected nodes) ── */
function buildRight(data) {
  var nodes      = data.nodes || [];
  var allLinked  = [];
  nodes.forEach(function(n) {
    (n.connected || []).forEach(function(c) { allLinked.push(c); });
  });

  var card  = document.getElementById('connected-card');
  var count = allLinked.length;

  var header = '<div class="card-header">'
    + '<span class="card-title">Connected Nodes</span>'
    + (count ? '<span class="connected-count">' + count + ' linked</span>' : '')
    + '</div>';

  var body = '';
  if (!count) {
    body = '<div class="connected-list connected-empty">No nodes linked</div>';
  } else {
    body = '<div class="connected-list">';
    allLinked.forEach(function(c) {
      body += '<div class="node-row">'
        + '<div class="node-row-keyed' + (c.keyed ? ' keyed' : '') + '"></div>'
        + '<div class="node-row-num">' + esc(c.node) + '</div>'
        + '<div class="node-row-call">' + esc(c.callsign || '—') + '</div>'
        + '<div class="node-row-loc">' + esc(c.location || c.desc || '') + '</div>'
        + '</div>';
    });
    body += '</div>';
  }

  card.innerHTML = header + body;
}

/* ── Update footer ── */
function updateFooter(data) {
  var pill = document.getElementById('ast-pill');
  var running = data.asterisk_active;
  pill.className = 'ast-status-pill ' + (running ? 'running' : 'stopped');
  document.getElementById('ast-pill-text').textContent = running ? 'Asterisk Running' : 'Asterisk Stopped';

  document.getElementById('f-asl').textContent     = data.asl_version || '—';
  document.getElementById('f-ast-ver').textContent = data.asterisk_version || '—';
  document.getElementById('f-uptime').textContent  = data.uptime || '—';

  var disk = data.disk;
  document.getElementById('f-disk').textContent = disk ? disk.used + ' / ' + disk.total : '—';

  var now = new Date();
  document.getElementById('f-updated').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');

  var anyStale = (data.nodes || []).some(function(n) { return n.stale; });
  document.getElementById('f-stale').style.display = anyStale ? '' : 'none';
}

/* ── Main refresh ── */
async function refresh() {
  try {
    var r = await fetch('/api/status/board');
    if (!r.ok) return;
    var data = await r.json();
    buildLeft(data);
    buildRight(data);
    updateFooter(data);
  } catch(e) {}
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
